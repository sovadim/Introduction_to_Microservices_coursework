services:
  resource-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: resourcedb
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
    ports:
      - "5432:5432"

  song-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: songdb
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
    ports:
      - "5433:5432"
